services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - API_KEY=${API_KEY:-}
      - SCAN_ALLOWED_ROOTS=${SCAN_ALLOWED_ROOTS:-}
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_USE_LOCAL=${EMBEDDING_USE_LOCAL:-true}
      - EMBEDDING_LOCAL_MODEL=${EMBEDDING_LOCAL_MODEL:-paraphrase-multilingual-MiniLM-L12-v2}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?请在 .env 文件中设置 NEO4J_PASSWORD}
      - NEO4J_ENABLED=true
    depends_on:
      - qdrant
      - neo4j
    volumes:
      - ./backend/app:/app/app
      - backend_data:/app/data

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8002/api
    depends_on:
      - backend

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Neo4j 图数据库
  neo4j:
    image: neo4j:5.15.0
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?请在 .env 文件中设置 NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  backend_data:
